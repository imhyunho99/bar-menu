<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu QR Code</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 아치형 컨테이너 */
        .arch-frame {
            background-color: #000;
            border: 8px solid #fff; /* 유선형 느낌을 위한 두꺼운 흰색 테두리 */
            border-top-left-radius: 200px;
            border-top-right-radius: 200px;
            width: 380px;
            padding: 60px 40px 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* QR 코드를 감싸는 흰색 둥근 사각형 */
        .qr-wrapper {
            background-color: #fff;
            padding: 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-bottom: 30px;
            margin-top: 40px;
        }

        .qr-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* MENU_ 텍스트 */
        .menu-text {
            font-family: 'Courier Prime', monospace;
            font-size: 52px;
            font-weight: 700;
            letter-spacing: 4px;
            margin-top: 10px;
            color: #fff;
            text-transform: uppercase;
        }

        /* 하단 URL 정보 (필요시 표시, 디자인상 숨김 처리 가능) */
        .url-info {
            margin-top: 30px;
            font-size: 12px;
            color: #444;
            text-decoration: none;
            word-break: break-all;
            text-align: center;
        }

        @media (max-width: 480px) {
            .arch-frame {
                width: 100%;
                max-width: 320px;
                padding: 40px 30px 30px 30px;
                border-top-left-radius: 160px;
                border-top-right-radius: 160px;
            }
            
            .menu-text {
                font-size: 40px;
            }
        }
    </style>
</head>

<body>
    <div class="arch-frame">
        <div class="qr-wrapper">
            <img src="data:image/png;base64,{{ qr_image }}" alt="Menu QR Code">
        </div>
        <div class="menu-text">MENU_</div>
        
        <!-- 개발 확인용 URL (실제 운영 시 제거 가능) -->
        <a href="{{ menu_url }}" class="url-info">{{ menu_url }}</a>
    </div>
</body>

</html>
